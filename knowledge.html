<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>∞ Knowledge Sharing</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="main-content">
  <h1 data-lang-en="Welcome" data-lang-mm="ကြိုဆိုပါတယ်">Welcome</h1>
  <select aria-label="lang-select">
    <option value="en">English</option>
    <option value="mm">မြန်မာ</option>
  </select>

    <h2>∞ Knowledge Sharing</h2>
    <h3 id="welcome-user">👋 Welcome!</h3>

    <div class="library">
      <ul>
        <li><a href="infinity/tax-calculator.html">Myanmar Income Tax Calculator</a></li>
        <li><a href="infinity/guidesway.html">Global HR Cloud Mobile Guide</a></li>
        <li><a href="infinity/edocument.html">How to create a Storage Account</a></li>
      </ul>
    </div>

    <button id="signout-btn">Sign Out</button>
  </div>
  
  <script>
    const username = localStorage.getItem('username');
    if (username) {
      alert(`👋 Welcome, ${username}`);
      document.getElementById('welcome-user').textContent = `👋 Welcome, ${username}`;
    }
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
  
    const firebaseConfig =  {
      apiKey: "AIzaSyATK_3sYrjhehVHYvy32W9ukWi7ScCsNYk",
      authDomain: "starter-setup.firebaseapp.com",
      projectId: "starter-setup",
      storageBucket: "starter-setup.appspot.com",
      messagingSenderId: "461018098182",
      appId: "1:461018098182:web:030e85a562932ac118f187"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
  
    const uid = localStorage.getItem('uid');
    if (uid) {
      const userRef = doc(db, "users", uid);
      onSnapshot(userRef, (doc) => {
        if (doc.exists()) {
          const data = doc.data();
          document.getElementById('welcome-user').textContent = `👋 ${data.username}`;
        }
      });
    }
  </script>
  
</body>
</html>

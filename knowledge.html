<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>∞ Knowledge Sharing</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="main-content">
    <h1>∞ Knowledge Sharing</h1>

    <div class="library">
      <ul>
        <li><a href="infinity/tax-calculator.html">Myanmar Income Tax Calculator</a></li>
        <li><a href="infinity/guidesway.html">Global HR Cloud Mobile Guide</a></li>
        <li><a href="infinity/edocument.html">How to create a Storage Account</a></li>
      </ul>
    </div>

    <button id="signout-btn">Sign Out</button>
  </div>
  
  <script>
    // LocalStorage က Username ကိုဖတ်မယ်
    const username = localStorage.getItem('username');

    if (username) {
      alert(`Welcome, ${username}! 🎉`);
      // ပြီးရင်ဖျက်မယ် မနေနဲ့ LocalStorage မှာ
      localStorage.removeItem('username');
    } else {
      alert('Welcome!');
    }
  </script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyATK_3sYrjhehVHYvy32W9ukWi7ScCsNYk",
      authDomain: "starter-setup.firebaseapp.com",
      projectId: "starter-setup",
      storageBucket: "starter-setup.appspot.com",
      messagingSenderId: "461018098182",
      appId: "1:461018098182:web:030e85a562932ac118f187"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById("main-content").style.display = "block";
      } else {
        window.location.href = "signup.html";
      }
    });

    document.getElementById("signout-btn").addEventListener("click", () => {
      auth.signOut().then(() => window.location.href = "signup.html");
    });
  </script>
</body>
</html>

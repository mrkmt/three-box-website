<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <title>Modern Login Page | KMTechSpaceship</title>
</head>
<body>
  <div class="container" id="container">
    <!-- Sign Up Form -->
    <div class="form-container sign-up">
      <form id="signUpForm">
        <h1>Create Account</h1>
        <div class="social-icons">
          <a href="#" class="icon" id="googleSignUp"><i class="fa-brands fa-google-plus-g"></i></a>
        </div>
        <span>or use your email for registration</span>
        <input type="text" placeholder="Name" id="signUpName" required>
        <input type="email" placeholder="Email" id="signUpEmail" required>
        <input type="password" placeholder="Password" id="signUpPassword" required>
        <button type="submit">Sign Up</button>
      </form>
    </div>

    <!-- Sign In Form -->
    <div class="form-container sign-in">
      <form id="signInForm">
        <h1>Sign In</h1>
        <div class="social-icons">
          <a href="#" class="icon" id="googleSignIn"><i class="fa-brands fa-google-plus-g"></i></a>
        </div>
        <span>or use your email and password</span>
        <input type="email" placeholder="Email" id="signInEmail" required>
        <input type="password" placeholder="Password" id="signInPassword" required>
        <a href="#">Forgot Your Password?</a>
        <button type="submit">Sign In</button>
      </form>
    </div>

    <!-- Toggle Panels -->
    <div class="toggle-container">
      <div class="toggle">
        <div class="toggle-panel toggle-left">
          <h1>Welcome Back!</h1>
          <p>To keep connected with us, please login with your personal info</p>
          <button class="hidden" id="login">Sign In</button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>Hello, Friend!</h1>
          <p>Enter your personal details and start your journey with us</p>
          <button class="hidden" id="register">Sign Up</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-analytics.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyATK_3sYrjhehVHYvy32W9ukWi7ScCsNYk",
      authDomain: "starter-setup.firebaseapp.com",
      projectId: "starter-setup",
      storageBucket: "starter-setup.firebasestorage.app",
      messagingSenderId: "461018098182",
      appId: "1:461018098182:web:030e85a562932ac118f187",
      measurementId: "G-K8WH6SJ0M9"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const analytics = firebase.analytics();
  </script>

  <!-- Auth Logic -->
  <script>
    // Sign Up with Email
    document.getElementById('signUpForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('signUpEmail').value;
      const password = document.getElementById('signUpPassword').value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(userCredential => {
          alert("Account created for: " + userCredential.user.email);
          window.location.href = "knowledge.html"; // Redirect after sign up
        })
        .catch(error => {
          alert("Error: " + error.message);
        });
    });

    // Sign In with Email
    document.getElementById('signInForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('signInEmail').value;
      const password = document.getElementById('signInPassword').value;

      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          alert("Welcome back, " + userCredential.user.email);
          window.location.href = "knowledge.html"; // Redirect after sign in
        })
        .catch(error => {
          alert("Login failed: " + error.message);
        });
    });

    // Sign In with Google
    document.getElementById("googleSignIn").addEventListener("click", function (e) {
      e.preventDefault();
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(result => {
          alert("Signed in with Google: " + result.user.email);
          window.location.href = "knowledge.html"; // Redirect after Google login
        })
        .catch(error => {
          alert("Google Sign-In Error: " + error.message);
        });
    });

    // Sign Up with Google (same as sign in)
    document.getElementById("googleSignUp").addEventListener("click", function (e) {
      e.preventDefault();
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(result => {
          alert("Signed up with Google: " + result.user.email);
          window.location.href = "knowledge.html"; // Redirect after Google sign up
        })
        .catch(error => {
          alert("Google Sign-Up Error: " + error.message);
        });
    });
  </script>

  <!-- UI toggle script -->
  <script>
    const container = document.getElementById('container');
    document.getElementById('register').addEventListener('click', () => {
      container.classList.add("right-panel-active");
    });
    document.getElementById('login').addEventListener('click', () => {
      container.classList.remove("right-panel-active");
    });
  </script>
</body>
</html>

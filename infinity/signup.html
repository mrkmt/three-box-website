<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <title>Login | KMTechSpaceship</title>
</head>
<body>
  <div class="container" id="container">
    <!-- Sign Up Form -->
    <div class="form-container sign-up">
      <form id="signup-form">
        <h1>Create Account</h1>
        <div class="social-icons">
          <a href="#" class="icon" id="googleSignUp"><i class="fa-brands fa-google-plus-g"></i></a>
        </div>
        <span>or use your email for registration</span>
        <input type="text" id="signup-name" placeholder="Name" required>
        <input type="email" id="signup-email" placeholder="Email" required>
        <input type="password" id="signup-password" placeholder="Password" required>
        <button type="submit">Sign Up</button>
      </form>
    </div>

    <!-- Sign In Form -->
    <div class="form-container sign-in">
      <form id="signin-form">
        <h1>Sign In</h1>
        <div class="social-icons">
          <a href="#" class="icon" id="googleSignIn"><i class="fa-brands fa-google-plus-g"></i></a>
        </div>
        <span>or use your email and password</span>
        <input type="email" id="signin-email" placeholder="Email" required>
        <input type="password" id="signin-password" placeholder="Password" required>
        <a href="#">Forget Your Password?</a>
        <button type="submit">Sign In</button>
      </form>
    </div>

    <!-- Panel Toggle -->
    <div class="toggle-container">
      <div class="toggle">
        <div class="toggle-panel toggle-left">
          <h1>Welcome Back!</h1>
          <p>Enter your personal details to use all of site features</p>
          <button class="hidden" id="login">Sign In</button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>Hello, Friend!</h1>
          <p>Register with your personal details to use all of site features</p>
          <button class="hidden" id="register">Sign Up</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-analytics.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyATK_3sYrjhehVHYvy32W9ukWi7ScCsNYk",
      authDomain: "starter-setup.firebaseapp.com",
      projectId: "starter-setup",
      storageBucket: "starter-setup.appspot.com",
      messagingSenderId: "461018098182",
      appId: "1:461018098182:web:030e85a562932ac118f187",
      measurementId: "G-K8WH6SJ0M9"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const analytics = firebase.analytics();

    // Email Signup
    document.getElementById("signup-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("signup-email").value;
      const password = document.getElementById("signup-password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("Signup Successful!");
          window.location.href = "knowledge.html";
        })
        .catch((error) => alert("Signup Error: " + error.message));
    });

    // Email Signin
    document.getElementById("signin-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("signin-email").value;
      const password = document.getElementById("signin-password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("Welcome back!");
          window.location.href = "knowledge.html";
        })
        .catch((error) => alert("Signin Error: " + error.message));
    });

    // Google Sign In
    document.getElementById("googleSignIn").addEventListener("click", function (e) {
      e.preventDefault();
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          alert("Signed in as " + result.user.email);
          window.location.href = "knowledge.html";
        })
        .catch((error) => alert("Google Sign-in Error: " + error.message));
    });

    // Google Sign Up (same as Sign In)
    document.getElementById("googleSignUp").addEventListener("click", function (e) {
      e.preventDefault();
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          alert("Signed up as " + result.user.email);
          window.location.href = "knowledge.html";
        })
        .catch((error) => alert("Google Sign-up Error: " + error.message));
    });

    // Analytics (track page view)
    analytics.logEvent('page_view', { page_path: window.location.pathname });
  </script>

  <!-- Form toggle JS -->
  <script>
    const container = document.getElementById('container');
    document.getElementById('register').addEventListener('click', () => {
      container.classList.add("right-panel-active");
    });
    document.getElementById('login').addEventListener('click', () => {
      container.classList.remove("right-panel-active");
    });
  </script>
</body>
</html>

    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
      <link rel="stylesheet" href="css/styless.css" />
      <title>Sign Up with Google</title>
    </head>
    <body>
    
      <div class="container" id="container">
        <div class="form-container sign-up">
          <form>
            <h1>Create Account</h1>
            <div class="social-icons">
              <a href="#" class="icon google-signin"><i class="fa-brands fa-google-plus-g"></i></a>
            </div>
            <span>or use your email for registration</span>
            <input type="text" placeholder="Name" />
            <input type="email" placeholder="Email" />
            <input type="password" placeholder="Password" />
            <button-type>Sign Up</button-type>
          </form>
        </div>
      </div>
    
      <!-- Firebase SDK Scripts -->
      <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    
        // 🔧 Replace with your Firebase config
        const firebaseConfig = {
       apiKey:  "AIzaSyATK_3sYrjhehVHYvy32W9ukWi7ScCsNYk",
       authDomain: "starter-setup.firebaseapp.com",
       projectId: "starter-setup",
       appId: "1:461018098182:web:030e85a562932ac118f187"
       };

    
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);
    
        // Sign in with Google
        document.querySelector('.google-signin').addEventListener('click', async (e) => {
          e.preventDefault();
          try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
    
            const username = prompt("Enter your preferred username:");
            if (username) {
              await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                email: user.email,
                username: username,
                displayName: user.displayName || "",
                createdAt: new Date().toISOString()
              });
              // ✅ Redirect to knowledge.html
              window.location.href = "knowledge.html";
            } else {
              alert("Username is required to continue.");
            }
          } catch (error) {
            console.error("Sign-in error:", error);
            alert("Google Sign-in failed.");
          }
        });
      </script>
    
    </body>
    </html>
